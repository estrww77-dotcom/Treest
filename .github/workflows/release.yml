name: Build & Release RedSea.exe
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Restore
        working-directory: desktop
        run: dotnet restore OpenSteam.sln
      - name: Publish
        working-directory: desktop
        run: dotnet publish OpenSteam.sln -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: "RedSea ${{ github.event.inputs.tag || github.ref_name }}"
          files: desktop/bin/Release/net9.0-windows/win-x64/publish/RedSea.exe
